<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <style>@import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600&amp;family=DM+Sans:wght@300;400&amp;family=DM+Mono:wght@400&amp;display=swap');</style>

  <!-- Background -->
  <rect width="1080" height="1440" fill="#4A6741"/>

  <!-- Checkmark icon top-right -->
  <g transform="translate(860, 120)" opacity="0.35">
    <circle cx="40" cy="40" r="36" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <polyline points="22,40 36,54 58,28" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Heading -->
  <text x="80" y="560" font-family="'Lora', serif" font-size="48" font-weight="600" fill="#FFFFFF" letter-spacing="-0.5">
    <tspan x="80" dy="0">"Once Airbnb trusts</tspan>
    <tspan x="80" dy="64">your listing, it puts</tspan>
    <tspan x="80" dy="64">you in front of</tspan>
    <tspan x="80" dy="64">everybody."</tspan>
  </text>

  <!-- Subtext -->
  <text x="80" y="850" font-family="'DM Sans', sans-serif" font-size="16" font-weight="300" fill="#FFFFFF" opacity="0.35">
    Trust is earned through data.
  </text>
</svg>