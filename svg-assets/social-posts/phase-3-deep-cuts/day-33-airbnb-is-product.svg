<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <style>@import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600&amp;family=DM+Sans:wght@300;400&amp;family=DM+Mono:wght@400&amp;display=swap');</style>

  <!-- Background with border -->
  <rect width="1080" height="1440" fill="#FFFFFF"/>
  <rect x="0.5" y="0.5" width="1079" height="1439" fill="none" stroke="#E0DCDA" stroke-width="1"/>

  <!-- Camera icon top-right -->
  <g transform="translate(870, 115)" opacity="0.35">
    <rect x="6" y="16" width="48" height="32" rx="4" fill="none" stroke="#32302F" stroke-width="2"/>
    <circle cx="30" cy="32" r="10" fill="none" stroke="#32302F" stroke-width="2"/>
    <path d="M22,16 L26,8 L34,8 L38,16" fill="none" stroke="#32302F" stroke-width="2"/>
  </g>

  <!-- Heading -->
  <text x="80" y="640" font-family="'Lora', serif" font-size="54" font-weight="600" fill="#32302F" letter-spacing="-0.5">
    <tspan x="80" dy="0">"Your Airbnb is</tspan>
    <tspan x="80" dy="72">a product."</tspan>
  </text>

  <!-- Subtext -->
  <text x="80" y="810" font-family="'DM Sans', sans-serif" font-size="24" font-weight="300" fill="#32302F" opacity="0.3">
    Are you marketing it like one?
  </text>

  <!-- Green accent bar at bottom -->
  <rect x="0" y="1436" width="1080" height="4" fill="#4A6741"/>
</svg>