<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <style>@import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600&amp;family=DM+Sans:wght@300;400&amp;family=DM+Mono:wght@400&amp;display=swap');</style>

  <!-- Background -->
  <rect width="1080" height="1440" fill="#4A6741"/>

  <!-- Heading -->
  <text x="80" y="620" font-family="'Lora', serif" font-size="54" font-weight="600" fill="#FFFFFF" letter-spacing="-0.5">
    We needed this.
  </text>

  <!-- Subtext -->
  <text x="80" y="690" font-family="'DM Sans', sans-serif" font-size="24" font-weight="300" fill="#FFFFFF" opacity="0.45">
    So we built it.
  </text>

  <!-- Body lines -->
  <text x="80" y="790" font-family="'DM Sans', sans-serif" font-size="12" fill="#FFFFFF" opacity="0.3" letter-spacing="0.5">
    <tspan x="80" dy="0">Hosts first.</tspan>
    <tspan x="80" dy="24">Consultants second.</tspan>
    <tspan x="80" dy="24">Engineers third.</tspan>
  </text>
</svg>
