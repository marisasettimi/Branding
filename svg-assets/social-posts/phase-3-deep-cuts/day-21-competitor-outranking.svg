<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <style>@import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600&amp;family=DM+Sans:wght@300;400&amp;family=DM+Mono:wght@400&amp;display=swap');</style>

  <!-- Background -->
  <rect width="1080" height="1440" fill="#32302F"/>

  <!-- Eye icon top-right -->
  <g transform="translate(870, 120)" opacity="0.35">
    <ellipse cx="30" cy="28" rx="28" ry="18" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="30" cy="28" r="9" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="30" cy="28" r="3" fill="#FFFFFF"/>
  </g>

  <!-- Heading -->
  <text x="80" y="600" font-family="'Lora', serif" font-size="48" font-weight="600" fill="#FFFFFF" letter-spacing="-0.5">
    <tspan x="80" dy="0">"Why your competitor</tspan>
    <tspan x="80" dy="64">with a worse house</tspan>
    <tspan x="80" dy="64">is outranking you."</tspan>
  </text>

  <!-- Subtext -->
  <text x="80" y="820" font-family="'DM Sans', sans-serif" font-size="16" font-weight="300" fill="#FFFFFF" opacity="0.3">
    <tspan x="80" dy="0">It's not about the property.</tspan>
    <tspan x="80" dy="28">It's about the listing.</tspan>
  </text>
</svg>