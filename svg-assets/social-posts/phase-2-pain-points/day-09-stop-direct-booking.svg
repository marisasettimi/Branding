<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <style>@import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600&amp;family=DM+Sans:wght@300;400&amp;family=DM+Mono:wght@400&amp;display=swap');</style>

  <!-- Background with border -->
  <rect width="1080" height="1440" fill="#FFFFFF"/>
  <rect x="0.5" y="0.5" width="1079" height="1439" fill="none" stroke="#E0DCDA" stroke-width="1"/>

  <!-- Globe icon top-right -->
  <g transform="translate(880, 120)" opacity="0.4">
    <circle cx="28" cy="28" r="26" fill="none" stroke="#32302F" stroke-width="2"/>
    <!-- Horizontal line -->
    <line x1="2" y1="28" x2="54" y2="28" stroke="#32302F" stroke-width="2"/>
    <!-- Vertical line -->
    <line x1="28" y1="2" x2="28" y2="54" stroke="#32302F" stroke-width="2"/>
    <!-- Left arc -->
    <ellipse cx="28" cy="28" rx="12" ry="26" fill="none" stroke="#32302F" stroke-width="2"/>
  </g>

  <!-- Heading -->
  <text x="80" y="600" font-family="'Lora', serif" font-size="54" font-weight="600" fill="#32302F" letter-spacing="-0.5">
    <tspan x="80" dy="0">Stop building a direct</tspan>
    <tspan x="80" dy="72">booking site.</tspan>
  </text>

  <!-- Subtext -->
  <text x="80" y="750" font-family="'DM Sans', sans-serif" font-size="13" font-weight="300" fill="#32302F" opacity="0.3">
    Your guests are already on Airbnb searching.
  </text>

  <!-- Green accent bar at bottom -->
  <rect x="0" y="1436" width="1080" height="4" fill="#4A6741"/>
</svg>
