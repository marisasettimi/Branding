<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <style>@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&amp;family=DM+Sans:wght@300;400&amp;family=DM+Mono:wght@400&amp;display=swap');</style>

  <!-- Background -->
  <rect width="1080" height="1440" fill="#32302F"/>

  <!-- Heading -->
  <text x="80" y="620" font-family="'Lora', serif" font-size="54" font-weight="600" fill="#FFFFFF" letter-spacing="-0.5">
    It's not a supply issue.
  </text>

  <!-- Subtext (italic) -->
  <text x="80" y="700" font-family="'Lora', serif" font-size="36" font-weight="400" font-style="italic" fill="#FFFFFF" opacity="0.5" letter-spacing="-0.3">
    It's a whispering issue.
  </text>

  <!-- Body lines -->
  <text x="80" y="800" font-family="'DM Sans', sans-serif" font-size="12" font-weight="300" fill="#FFFFFF" opacity="0.25" letter-spacing="0.5">
    <tspan x="80" dy="0">Too loud = overpriced, sitting empty.</tspan>
    <tspan x="80" dy="28">Too quiet = underpriced, giving away margin.</tspan>
  </text>

  <!-- Logo bottom-right -->
  <g transform="translate(960, 1360) scale(0.75)" opacity="0.2">
    <path d="M6 20C6 12 12 6 22 6H26C36 6 42 12 42 20C42 28 36 34 26 34H20L12 40V34C8.5 32 6 27 6 20Z" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M15 21C15 21 17 14 19.5 14C22 14 22 28 24.5 28C27 28 27 16 29 16C31 16 32 22 33 22" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
