<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <style>@import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600&amp;family=DM+Sans:wght@300;400&amp;family=DM+Mono:wght@400&amp;display=swap');</style>

  <!-- Background -->
  <rect width="1080" height="1440" fill="#4A6741"/>

  <!-- Globe icon top-right -->
  <g transform="translate(880, 120)" opacity="0.35">
    <circle cx="28" cy="28" r="24" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <ellipse cx="28" cy="28" rx="12" ry="24" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="4" y1="28" x2="52" y2="28" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="28" y1="4" x2="28" y2="52" stroke="#FFFFFF" stroke-width="1.5"/>
  </g>

  <!-- Heading -->
  <text x="80" y="620" font-family="'Lora', serif" font-size="48" font-weight="600" fill="#FFFFFF" letter-spacing="-0.5">
    <tspan x="80" dy="0">"Why you should</tspan>
    <tspan x="80" dy="64">NOT leave Airbnb."</tspan>
  </text>

  <!-- Subtext -->
  <text x="80" y="810" font-family="'DM Sans', sans-serif" font-size="16" font-weight="300" fill="#FFFFFF" opacity="0.35">
    <tspan x="80" dy="0">Do not abandon your best</tspan>
    <tspan x="80" dy="28">distribution channel.</tspan>
  </text>
</svg>