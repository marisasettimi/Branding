<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <style>@import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600&amp;family=DM+Sans:wght@300;400&amp;family=DM+Mono:wght@400&amp;display=swap');</style>

  <!-- Background with border -->
  <rect width="1080" height="1440" fill="#FFFFFF"/>
  <rect x="0.5" y="0.5" width="1079" height="1439" fill="none" stroke="#E0DCDA" stroke-width="1"/>

  <!-- Pulse icon top-right -->
  <g transform="translate(860, 120)" opacity="0.35">
    <polyline points="0,30 20,30 30,10 40,50 50,20 60,30 80,30" fill="none" stroke="#32302F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Heading -->
  <text x="80" y="580" font-family="'Lora', serif" font-size="48" font-weight="600" fill="#32302F" letter-spacing="-0.5">
    <tspan x="80" dy="0">"If your bookings</tspan>
    <tspan x="80" dy="64">suddenly dropped,</tspan>
    <tspan x="80" dy="64">it probably isn't</tspan>
    <tspan x="80" dy="64">competition."</tspan>
  </text>

  <!-- Subtext -->
  <text x="80" y="860" font-family="'DM Sans', sans-serif" font-size="16" font-weight="300" fill="#32302F" opacity="0.3">
    <tspan x="80" dy="0">The market didn't fail.</tspan>
    <tspan x="80" dy="28">The listing didn't keep up.</tspan>
  </text>

  <!-- Green accent bar at bottom -->
  <rect x="0" y="1436" width="1080" height="4" fill="#4A6741"/>
</svg>