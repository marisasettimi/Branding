<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <style>@import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600&amp;family=DM+Sans:wght@300;400&amp;family=DM+Mono:wght@400&amp;display=swap');</style>

  <!-- Background with border -->
  <rect width="1080" height="1440" fill="#FFFFFF"/>
  <rect x="0.5" y="0.5" width="1079" height="1439" fill="none" stroke="#E0DCDA" stroke-width="1"/>

  <!-- Top label -->
  <text x="80" y="620" font-family="'DM Mono', monospace" font-size="11" fill="#4A6741" letter-spacing="2" text-transform="uppercase">
    AUDITS
  </text>

  <!-- Heading -->
  <text x="80" y="680" font-family="'Lora', serif" font-size="36" font-weight="600" fill="#32302F" letter-spacing="-0.3">
    Listing audits
  </text>

  <!-- Body -->
  <text x="80" y="740" font-family="'DM Sans', sans-serif" font-size="18" fill="#32302F" opacity="0.5">
    <tspan x="80" dy="0">Full review of your listing, photos,</tspan>
    <tspan x="80" dy="28">title, and pricing setup.</tspan>
  </text>
