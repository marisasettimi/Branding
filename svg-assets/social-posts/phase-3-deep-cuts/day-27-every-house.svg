<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <style>@import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600&amp;family=DM+Sans:wght@300;400&amp;family=DM+Mono:wght@400&amp;display=swap');</style>

  <!-- Background -->
  <rect width="1080" height="1440" fill="#32302F"/>

  <!-- House icon top-right -->
  <g transform="translate(870, 115)" opacity="0.35">
    <path d="M10,35 L10,22 L30,8 L50,22 L50,35 Z" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round"/>
    <rect x="22" y="24" width="16" height="11" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  </g>

  <!-- Heading -->
  <text x="80" y="640" font-family="'Lora', serif" font-size="54" font-weight="600" fill="#FFFFFF" letter-spacing="-0.5">
    <tspan x="80" dy="0">"Every house is</tspan>
    <tspan x="80" dy="72">a house."</tspan>
  </text>

  <!-- Subtext -->
  <text x="80" y="830" font-family="'DM Sans', sans-serif" font-size="24" font-weight="300" fill="#FFFFFF" opacity="0.35">
    <tspan x="80" dy="0">Pricing is what makes</tspan>
    <tspan x="80" dy="34">it a business.</tspan>
  </text>

  <!-- Logo bottom-right -->
  <g transform="translate(980, 1360) scale(0.4167)" opacity="0.15">
    <path d="M6 20C6 12 12 6 22 6H26C36 6 42 12 42 20C42 28 36 34 26 34H20L12 40V34C8.5 32 6 27 6 20Z" fill="none" stroke="#FFFFFF" stroke-width="2.2"/>
    <path d="M15 21C15 21 17 14 19.5 14C22 14 22 28 24.5 28C27 28 27 16 29 16C31 16 32 22 33 22" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>