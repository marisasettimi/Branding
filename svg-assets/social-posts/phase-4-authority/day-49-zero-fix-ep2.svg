<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <style>@import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600&amp;family=DM+Sans:wght@300;400&amp;family=DM+Mono:wght@400&amp;display=swap');</style>

  <!-- Background with border -->
  <rect width="1080" height="1920" fill="#FFFFFF"/>
  <rect x="0.5" y="0.5" width="1079" height="1919" fill="none" stroke="#E0DCDA" stroke-width="1"/>

  <!-- Supertitle -->
  <text x="540" y="560" font-family="'DM Mono', monospace" font-size="14" fill="#32302F" opacity="0.3" letter-spacing="3" text-anchor="middle">
    THE $0 FIX
  </text>
  <text x="540" y="590" font-family="'DM Mono', monospace" font-size="14" fill="#32302F" opacity="0.3" letter-spacing="3" text-anchor="middle">
    EP. 02
  </text>

  <!-- Center context -->
  <text x="540" y="760" font-family="'DM Mono', monospace" font-size="14" fill="#32302F" opacity="0.3" letter-spacing="2" text-anchor="middle">
    DESCRIPTION REWRITE
  </text>

  <!-- Center stat -->
  <text x="540" y="840" font-family="'Lora', serif" font-size="56" font-weight="600" fill="#4A6741" text-anchor="middle" letter-spacing="-1">
    2x
  </text>
  <text x="540" y="880" font-family="'DM Sans', sans-serif" font-size="18" fill="#32302F" opacity="0.35" text-anchor="middle">
    booking rate
  </text>

  <!-- Heading -->
  <text x="80" y="1060" font-family="'Lora', serif" font-size="36" font-weight="600" fill="#32302F" letter-spacing="-0.3">
    <tspan x="80" dy="0">"Rewriting this</tspan>
    <tspan x="80" dy="48">description doubled</tspan>
    <tspan x="80" dy="48">the booking rate."</tspan>
  </text>

  <!-- Play button -->
  <circle cx="540" cy="1400" r="40" fill="none" stroke="#32302F" stroke-width="2" opacity="0.3"/>
  <polygon points="528,1382 528,1418 560,1400" fill="#32302F" opacity="0.3"/>

  <!-- Footer -->
  <text x="540" y="1840" font-family="'DM Mono', monospace" font-size="12" fill="#32302F" opacity="0.2" letter-spacing="4" text-anchor="middle">
    REEL
  </text>
</svg>