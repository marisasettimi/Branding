<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <style>@import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600&amp;family=DM+Sans:wght@300;400&amp;family=DM+Mono:wght@400&amp;display=swap');</style>

  <!-- Background -->
  <rect width="1080" height="1440" fill="#32302F"/>

  <!-- House icon top-right -->
  <g transform="translate(860, 120)" opacity="0.35">
    <path d="M10 42 L40 16 L70 42" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M18 38 V62 H62 V38" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <rect x="32" y="46" width="16" height="16" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  </g>

  <!-- Heading -->
  <text x="80" y="580" font-family="'Lora', serif" font-size="48" font-weight="600" fill="#FFFFFF" letter-spacing="-0.5">
    <tspan x="80" dy="0">"We didn't build</tspan>
    <tspan x="80" dy="64">Rev Whisper to sell</tspan>
    <tspan x="80" dy="64">software."</tspan>
  </text>

  <!-- Subtext -->
  <text x="80" y="820" font-family="'DM Sans', sans-serif" font-size="24" font-weight="300" fill="#FFFFFF" opacity="0.35">
    We built it because we needed it.
  </text>

  <!-- Logo bottom-right -->
  <g transform="translate(960, 1380) scale(0.4167)" opacity="0.15">
    <path d="M6 20C6 12 12 6 22 6H26C36 6 42 12 42 20C42 28 36 34 26 34H20L12 40V34C8.5 32 6 27 6 20Z" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M15 21C15 21 17 14 19.5 14C22 14 22 28 24.5 28C27 28 27 16 29 16C31 16 32 22 33 22" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>